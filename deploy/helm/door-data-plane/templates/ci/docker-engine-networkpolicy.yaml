{{- if and .Values.ciDockerEngine.enabled .Values.ciDockerEngine.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: docker-engine
  namespace: door-ci
spec:
  podSelector:
    matchLabels:
      app: docker-engine
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: door-ci
      ports:
        - protocol: TCP
          port: {{ .Values.ciDockerEngine.service.port | default 2375 }}
{{- end }}
