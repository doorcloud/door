{{- if and .Values.doorApiGateway.defaultBackend.enabled (or (eq .Values.doorApiGateway.external.type "loadBalancer") (eq .Values.doorApiGateway.external.type "hostPort")) }}
# Catch-all on both Gateway listeners so Contour programs Envoy :8443 (HTTPS)
# and unmatched host/path traffic lands on the branded Door APIM page.
# No hostnames → lowest hostname specificity; real API HTTPRoutes/HTTPProxies win.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: door-apim-default-backend
  namespace: door-apigateway
  labels:
    app: door-apim-default-backend
    app.kubernetes.io/name: door-apim-default-backend
    app.kubernetes.io/part-of: door-apigateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: door
      sectionName: http
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: door
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: door-apim-default-backend
          port: 8080
          weight: 1
{{- end }}
