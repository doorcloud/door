global:
  # door-api config
  doorAPI:
    labels:
      # will be applied to pods and deployment
    protocol: http
    # internalServiceName: door-api-svc
    externalUrl: https://api.example.com
    heathCheck:
      image:
        name: docker.io/nginxinc/nginx-unprivileged
        version: latest
      endpoint: /api/v1/healthy
# set defaultCluster=true if cluster content control plane
defaultCluster: false
defaultClusterType: gke
doorOnboarding:
  labels:
    # will be applied to pods and deployment
  image:
    name: docker.io/beopenit/onboarding-operator-kubernetes
    version: v3.0.2
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 512Mi
  #   limits:
  #     cpu: 1
  #     memory: 1Gi
doorCD:
  labels:
    # will be applied to pods and deployment
  # maxStagingReplicas: -22
  envs:
    - name: MAX_STAGING_REPLICAS
      value: "-1"
    - name: DOOR_AUTO_GEN_LISTENER
      value: "false"
    - name: INSECURE_REGISTRIES
      value: ""
    - name: DEFAULT_INTERNAL_GATEWAY_DOMAIN
      value: door.local
    - name: DEFAULT_TIMEOUT
      value: 30s
  image:
    name: docker.io/beopenit/door-cd-operator
    version: v3.0.4
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 2
  #     memory: 2Gi
doorAPIM:
  labels:
    # will be applied to pods and deployment
  envs:
    - name: WATCH_NAMESPACE
      value: ""
  image:
    name: docker.io/doorcloud/apim-operator
    version: v3.0.4
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 2
  #     memory: 2Gi
doorHelm:
  labels:
    # will be applied to pods and deployment
  # maxStagingReplicas: -22
  image:
    name: docker.io/beopenit/door-helm
    version: v3.0.1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 2Gi
doorAgent:
  # hostAliases:
  # - ip: 203.0.113.10
  #   hostnames:
  #     - endpoint.example.com
  #     - endpoint-0.example.com
  labels:
    # will be applied to pods and deployment
  metricServer: true
  image:
    name: docker.io/beopenit/door-agent
    version: v3.0.5
  rateLimit:
    METRICS_SERVER_RATE_LIMIT_DURATION_MS: 10
    METRICS_SERVER_RATE_LIMIT: 500
    METRICS_SERVER_REQUEST_TIMEOUT_SECOND: 30
  pipeline:
    cpuLimit: "1000m"
    memoryLimit: "2500Mi" 
    cpuRequest: "100m"
    memoryRequest: "300Mi"
    storageLimit: "25Gi"
    storageRequest: "25Gi"

  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 512Mi
  #   limits:
  #     cpu: 1
  #     memory: 1Gi
  kafka:
    brokers: door-kafka-cluster-kafka-external-bootstrap:9094
  licence:
    uuid: aa
    key: |
      my-key
    crt: |
      my-crt
    ca: |
      my-ca
    # Overwrite licence secret: set keys uuid, user.key, user.crt and ca.crt
    # secret:
    #   name: my-licence

monitoring:
  include: true
  pvcSize: 15Gi
  accessMode: ReadWriteOnce
  # storageClassName: gp2
  
metrics-server:
  args:
    - --kubelet-insecure-tls

doorApiGateway:
  internal: 
    enabled: false     # specify if you want to use internal gateway
    type: clusterIP
    nodeSelector: node-role.kubernetes.io/ingress-door
    tolerationsKey: ingress-door
    replicas: 2
    # annotations:
    #   service.beta.kubernetes.io/load-balancer-type: "Internal"
    #   service.beta.kubernetes.io/external-traffic-policy: "Local"
    #   service.beta.kubernetes.io/aws-load-balancer-internal: "0.0.0.0/0"
    # labels:
    #   app: door-apigateway-internal
  external:
    type: loadBalancer
    # loadBalancerIP: "xx.xx.xx.xx"
    # externalIPs:
    #   - "xx.xx.xx.xx"
    nodeSelector: node-role.kubernetes.io/ingress-door
    tolerationsKey: ingress-door
    unsecureHostPort: 8080
    secureHostPort: 8443
    replicas: 2

    # annotations:
    #   service.beta.kubernetes.io/load-balancer-type: "Internal"
    #   service.beta.kubernetes.io/external-traffic-policy: "Local"
    #   service.beta.kubernetes.io/aws-load-balancer-internal: "0.0.0.0/0"
    # labels:
    #   app: door-apigateway

  # Branded catch-all for unmatched gateway traffic + attaches a route to the
  # HTTPS listener so Contour programs Envoy :8443 (fixes TCP-refused on 443).
  defaultBackend:
    enabled: true
    replicas: 1
    image:
      repository: docker.io/doorcloud/door-apim-default-backend
      # Pin an immutable tag; never deploy :latest on workloads.
      tag: "v.0.0.a548fce"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

ciDockerEngine:
  enabled: true
  image:
    dind: docker:27-dind
    cli: docker:27-cli
  service:
    port: 2375
  storage:
    size: 50Gi
    accessMode: ReadWriteOnce
    # storageClassName: gp2
  prune:
    schedule: "0 2 * * *"
    ttlSecondsAfterFinished: 600
  networkPolicy:
    enabled: false
